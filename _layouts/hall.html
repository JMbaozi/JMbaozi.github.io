---
layout: default
title: 名人堂
---

<section class="glass-hall">
  <div class="container">
    <div class="title-wrapper">
      <h1 class="elegant-title">CPU 名人堂</h1>
      <p class="elegant-subtitle">Legendary Roster</p>
    </div>

    <div class="glass-flex-container">
      {% for person in site.data.hall %}
      <div class="glass-card">
        <div class="card-inner">
          <div class="avatar-ring">
            <img src="{{ person.avatar }}" alt="{{ person.name }}" class="glass-avatar">
          </div>
          
          <div class="info-group">
            <span class="glass-role">{{ person.title }}</span>
            <h2 class="glass-name">{{ person.name }}</h2>
            <p class="glass-bio">“{{ person.bio }}”</p>
          </div>
          
          {% if person.link %}
          <a href="{{ person.link }}" target="_blank" class="glass-btn">
            了解更多
          </a>
          {% endif %}
        </div>
      </div>
      {% endfor %}
    </div>
  </div>
</section>

<style>
  /* 基础背景与字体设置 */
  .glass-hall {
    padding: 80px 20px;
    background: linear-gradient(135deg, #e0c3fc 0%, #8ec5fc 100%);
    min-height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }

  .container {
    max-width: 1200px;
    margin: 0 auto;
  }

  .title-wrapper {
    text-align: center;
    margin-bottom: 60px;
  }

  .elegant-title {
    font-size: 3rem;
    color: #fff;
    margin: 0;
    text-shadow: 0 4px 12px rgba(0,0,0,0.1);
    font-weight: 700;
  }

  .elegant-subtitle {
    font-size: 1rem;
    color: rgba(255, 255, 255, 0.9);
    letter-spacing: 4px;
    margin-top: 8px;
    text-transform: uppercase;
  }

  /* 核心布局逻辑：Flex 布局实现 3+2 且宽度一致 */
  .glass-flex-container {
    display: flex;
    flex-wrap: wrap;
    justify-content: center; /* 关键：让第二行的两个卡片居中 */
    gap: 30px;
    margin: 0 auto;
  }

  /* 桌面端：固定宽度，确保 3 个能排下一行 */
  .glass-card {
    background: rgba(255, 255, 255, 0.2);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(255, 255, 255, 0.4);
    border-radius: 24px;
    padding: 40px 25px;
    box-shadow: 0 10px 30px rgba(31, 38, 135, 0.1);
    transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
    text-align: center;
    
    /* 核心宽度计算：(100% - gap*2) / 3 */
    flex: 0 1 calc(33.333% - 30px);
    min-width: 300px; /* 保证卡片不会缩得太小 */
    box-sizing: border-box;
  }

  /* 悬停效果 */
  .glass-card:hover {
    transform: translateY(-10px);
    background: rgba(255, 255, 255, 0.35);
    box-shadow: 0 20px 50px rgba(31, 38, 135, 0.2);
    border-color: rgba(255, 255, 255, 0.6);
  }

  /* 移动端适配 */
  @media (max-width: 1024px) {
    .glass-card {
      flex: 0 1 calc(50% - 30px); /* 平板端一行两个 */
    }
  }

  @media (max-width: 700px) {
    .glass-card {
      flex: 0 1 100%; /* 手机端一行一个 */
    }
  }

  /* 卡片内部样式保持一致 */
  .card-inner {
    display: flex;
    flex-direction: column;
    height: 100%;
    align-items: center;
  }

  .avatar-ring {
    padding: 6px;
    background: linear-gradient(135deg, rgba(255,255,255,0.7), rgba(255,255,255,0.1));
    border-radius: 50%;
    margin-bottom: 25px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.05);
  }

  .glass-avatar {
    width: 110px;
    height: 110px;
    border-radius: 50%;
    object-fit: cover;
    display: block;
    border: 2px solid #fff;
  }

  .info-group {
    flex-grow: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 100%;
  }

  .glass-role {
    font-size: 0.7rem;
    font-weight: 800;
    color: #444;
    background: rgba(255, 255, 255, 0.5);
    padding: 4px 14px;
    border-radius: 50px;
    text-transform: uppercase;
    margin-bottom: 15px;
    letter-spacing: 2px;
    border: 1px solid rgba(255, 255, 255, 0.3);
  }

  .glass-name {
    font-size: 1.5rem;
    color: #1a1a1a;
    margin: 0 0 12px;
    font-weight: 700;
  }

  .glass-bio {
    font-size: 0.95rem;
    color: #333;
    line-height: 1.6;
    margin-bottom: 30px;
    font-style: italic;
    opacity: 0.85;
  }

  .glass-btn {
    display: inline-block;
    padding: 12px 32px;
    background: rgba(255, 255, 255, 0.4);
    color: #222;
    font-size: 0.9rem;
    font-weight: 600;
    text-decoration: none;
    border-radius: 50px;
    transition: all 0.3s ease;
    border: 1px solid rgba(255, 255, 255, 0.5);
    backdrop-filter: blur(5px);
  }

  .glass-btn:hover {
    background: #fff;
    color: #000;
    box-shadow: 0 8px 20px rgba(0,0,0,0.1);
    transform: scale(1.05);
  }
</style>
