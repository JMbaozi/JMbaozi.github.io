---
layout: default
title: 名人堂
---

<section class="glass-hall">
  <div class="container">
    <div class="title-wrapper">
      <h1 class="elegant-title">CPU 名人堂</h1>
      <p class="elegant-subtitle">Legendary Roster</p>
    </div>

    <div class="glass-grid">
      {% for person in site.data.hall %}
      <div class="glass-card card-pos-{{ forloop.index }}">
        <div class="card-inner">
          <div class="avatar-ring">
            <img src="{{ person.avatar }}" alt="{{ person.name }}" class="glass-avatar">
          </div>
          
          <div class="info-group">
            <span class="glass-role">{{ person.title }}</span>
            <h2 class="glass-name">{{ person.name }}</h2>
            <p class="glass-bio">“{{ person.bio }}”</p>
          </div>
          
          {% if person.link %}
          <a href="{{ person.link }}" target="_blank" class="glass-btn">
            了解更多
          </a>
          {% endif %}
        </div>
      </div>
      {% endfor %}
    </div>
  </div>
</section>

<style>
  /* 基础背景与字体设置 */
  .glass-hall {
    padding: 80px 20px;
    background: linear-gradient(135deg, #e0c3fc 0%, #8ec5fc 100%);
    min-height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }

  .container {
    max-width: 1100px;
    margin: 0 auto;
  }

  .title-wrapper {
    text-align: center;
    margin-bottom: 60px;
  }

  .elegant-title {
    font-size: 3rem;
    color: #fff;
    margin: 0;
    text-shadow: 0 4px 12px rgba(0,0,0,0.1);
    font-weight: 700;
  }

  .elegant-subtitle {
    font-size: 1rem;
    color: rgba(255, 255, 255, 0.9);
    letter-spacing: 4px;
    margin-top: 8px;
    text-transform: uppercase;
  }

  /* 核心布局逻辑：6列网格 */
  .glass-grid {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 30px;
  }

  /* 桌面端布局适配 (3+2) */
  @media (min-width: 992px) {
    /* 前三个占2列 (1/3宽) */
    .card-pos-1, .card-pos-2, .card-pos-3 {
      grid-column: span 2;
    }
    /* 后两个占3列 (1/2宽) */
    .card-pos-4, .card-pos-5 {
      grid-column: span 3;
      /* 限制下层卡片的最大宽度，防止在超宽屏下显得太宽 */
      max-width: 85%;
      justify-self: center; 
      width: 100%;
    }
  }

  /* 移动端与平板适配 */
  @media (max-width: 991px) {
    .glass-grid {
      grid-template-columns: repeat(2, 1fr);
    }
    .glass-card {
      grid-column: span 1 !important;
      max-width: 100% !important;
    }
  }

  @media (max-width: 600px) {
    .glass-grid {
      grid-template-columns: 1fr;
    }
  }

  /* 毛玻璃卡片样式 */
  .glass-card {
    background: rgba(255, 255, 255, 0.2);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(255, 255, 255, 0.4);
    border-radius: 24px;
    padding: 40px 25px;
    box-shadow: 0 10px 30px rgba(31, 38, 135, 0.1);
    transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
    text-align: center;
  }

  .glass-card:hover {
    transform: translateY(-10px);
    background: rgba(255, 255, 255, 0.35);
    box-shadow: 0 20px 50px rgba(31, 38, 135, 0.2);
    border-color: rgba(255, 255, 255, 0.6);
  }

  .card-inner {
    display: flex;
    flex-direction: column;
    height: 100%;
    align-items: center;
  }

  .avatar-ring {
    padding: 6px;
    background: linear-gradient(135deg, rgba(255,255,255,0.7), rgba(255,255,255,0.1));
    border-radius: 50%;
    margin-bottom: 25px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.05);
  }

  .glass-avatar {
    width: 110px;
    height: 110px;
    border-radius: 50%;
    object-fit: cover;
    display: block;
    border: 2px solid #fff;
  }

  .info-group {
    flex-grow: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 100%;
  }

  .glass-role {
    font-size: 0.7rem;
    font-weight: 800;
    color: #444;
    background: rgba(255, 255, 255, 0.5);
    padding: 4px 14px;
    border-radius: 50px;
    text-transform: uppercase;
    margin-bottom: 15px;
    letter-spacing: 2px;
    border: 1px solid rgba(255, 255, 255, 0.3);
  }

  .glass-name {
    font-size: 1.5rem;
    color: #1a1a1a;
    margin: 0 0 12px;
    font-weight: 700;
  }

  .glass-bio {
    font-size: 0.95rem;
    color: #333;
    line-height: 1.6;
    margin-bottom: 30px;
    font-style: italic;
    opacity: 0.85;
  }

  /* 按钮优化 */
  .glass-btn {
    display: inline-block;
    padding: 12px 32px;
    background: rgba(255, 255, 255, 0.4);
    color: #222;
    font-size: 0.9rem;
    font-weight: 600;
    text-decoration: none;
    border-radius: 50px;
    transition: all 0.3s ease;
    border: 1px solid rgba(255, 255, 255, 0.5);
    backdrop-filter: blur(5px);
  }

  .glass-btn:hover {
    background: #fff;
    color: #000;
    box-shadow: 0 8px 20px rgba(0,0,0,0.1);
    transform: scale(1.05);
  }
</style>
